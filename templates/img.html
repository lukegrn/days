{{define "body"}}
<h2 class="img">{{.Cur.Date}}</h2>
<h2><a href="/" class="close">x</a></h2>

<meta property="og:title" content="{{.Cur.Date}}" />
<meta
  property="og:image"
  content="https://days.lukegreen.xyz/static/{{.Cur.PreviewPath}}"
/>

<div
  style="
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 80vh;
  "
>
  <img class="img" src="/static/{{.Cur.Path}}" />
  <p style="text-align: center; position">{{.Cur.Caption}}</p>
</div>

<div>
  {{if .PrevDate}}
  <a href="/days/{{.PrevDate}}" class="nav left">←</a>
  {{end}}
</div>
<div>
  {{if .NextDate}}
  <a href="/days/{{.NextDate}}" class="nav right">→</a>
  {{end}}
</div>
{{end}}
